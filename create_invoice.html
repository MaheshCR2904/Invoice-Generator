{% extends "base.html" %}

{% block title %}Create Invoice - Invoice Generator{% endblock %}

{% block content %}
<div class="card">
    <h2>Create New Invoice</h2>
    <form method="POST" action="{{ url_for('create_invoice') }}">
        <div class="form-group">
            <label for="customer_name">Customer Name *</label>
            <input type="text" id="customer_name" name="customer_name" required>
        </div>
        
        <div class="form-group">
            <label for="customer_address">Customer Address</label>
            <textarea id="customer_address" name="customer_address" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <label for="customer_email">Customer Email</label>
            <input type="email" id="customer_email" name="customer_email">
        </div>
        
        <div class="form-group">
            <label for="customer_phone">Customer Phone</label>
            <input type="tel" id="customer_phone" name="customer_phone">
        </div>
        
        <h3 style="margin-top: 30px; margin-bottom: 15px;">Invoice Items</h3>
        
        <div id="items-container">
            <div class="item-row" style="display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end;">
                <div style="flex: 2;">
                    <label>Description</label>
                    <input type="text" name="item_description[]" required>
                </div>
                <div style="flex: 1;">
                    <label>Quantity</label>
                    <input type="number" name="item_quantity[]" value="1" min="1" required>
                </div>
                <div style="flex: 1;">
                    <label>Unit Price (₹)</label>
                    <input type="number" name="item_unit_price[]" value="0" min="0" step="0.01" required>
                </div>
            </div>
        </div>
        
        <button type="button" onclick="addItem()" class="btn btn-secondary" style="margin-bottom: 20px;">+ Add Item</button>
        
        <div class="form-group">
            <label for="tax_rate">Tax Rate (%)</label>
            <input type="number" id="tax_rate" name="tax_rate" value="18" min="0" max="100" step="0.1">
        </div>
        
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
        </div>
        
        <div style="margin-top: 30px;">
            <button type="submit" class="btn">Create Invoice</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-left: 10px;">Cancel</a>
        </div>
    </form>
</div>

<script>
function addItem() {
    const container = document.getElementById('items-container');
    const newRow = document.createElement('div');
    newRow.className = 'item-row';
    newRow.style = 'display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end;';
    newRow.innerHTML = `
        <div style="flex: 2;">
            <label>Description</label>
            <input type="text" name="item_description[]" required>
        </div>
        <div style="flex: 1;">
            <label>Quantity</label>
            <input type="number" name="item_quantity[]" value="1" min="1" required>
        </div>
        <div style="flex: 1;">
            <label>Unit Price (₹)</label>
            <input type="number" name="item_unit_price[]" value="0" min="0" step="0.01" required>
        </div>
        <button type="button" onclick="this.parentElement.remove()" style="background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Remove</button>
    `;
    container.appendChild(newRow);
}
</script>
{% endblock %}
